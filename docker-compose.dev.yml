services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: lyricus-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lyricus
      POSTGRES_USER: lyricus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lyricus_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - app-dev

  redis-dev:
    image: redis:7-alpine
    container_name: lyricus-redis-dev
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app-dev

  backend-dev:
    build: ./backend
    container_name: lyricus-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lyricus:${POSTGRES_PASSWORD:-lyricus_dev}@postgres-dev:5432/lyricus
      REDIS_URL: redis://redis-dev:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/auth/callback}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:3001/api/auth/discord/callback}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:3001/api/integrations/spotify/callback}
      FRONTEND_ORIGIN: http://localhost:3001
    depends_on:
      - postgres-dev
      - redis-dev
    networks:
      - app-dev

  adminer-dev:
    image: adminer:4-standalone
    container_name: lyricus-adminer-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - app-dev

  frontend-dev:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend-dev:8000
    container_name: lyricus-frontend-dev
    restart: unless-stopped
    environment:
      PORT: "80"
      BACKEND_URL: http://backend-dev:8000
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - backend-dev
    networks:
      - app-dev

volumes:
  postgres_data_dev:

networks:
  app-dev:
    driver: bridge
